name: Server Won't Start
description: The server starts but players can't connect, or it crashes on boot
labels: ["server"]
body:
  - type: markdown
    attributes:
      value: |
        Let's figure out what's going on. Check these first:
        - Did `make start` (fly deploy) finish without errors?
        - Did you wait for the first deploy + in-container game download (DepotDownloader; often 20–40+ minutes) before trying to connect?
        - Are you using the current IP from `make ip` (not a cached one)?

  - type: dropdown
    id: symptom
    attributes:
      label: What exactly is happening?
      options:
        - `make start` / fly deploy fails (paste output below)
        - Start succeeds but I can't connect in-game
        - Server starts then immediately crashes
        - Server works for a while then drops everyone
        - Can't find the server in the server list
    validations:
      required: true

  - type: textarea
    id: deploy-log
    attributes:
      label: Deploy / local command output
      description: Output from `make start` / `fly deploy` if provisioning failed.
      render: shell

  - type: textarea
    id: server-log
    attributes:
      label: Server log
      description: Output of `make logs` (fly logs) or `fly ssh console` + relevant files under /data
      render: shell

  - type: input
    id: player-count
    attributes:
      label: How many players are trying to connect?

  - type: input
    id: platform
    attributes:
      label: Platform (Steam / Xbox / Game Pass)
      description: Note — Xbox/Game Pass crossplay is not supported on self-hosted servers.
