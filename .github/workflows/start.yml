name: Start Server

on:
  workflow_dispatch:
    inputs:
      session_hours:
        description: "How many hours before auto-shutdown (default: 6)"
        required: false
        default: "6"

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform/scaleway
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/scaleway
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_scw_access_key: ${{ secrets.SCW_ACCESS_KEY }}
          TF_VAR_scw_secret_key: ${{ secrets.SCW_SECRET_KEY }}
          TF_VAR_scw_project_id: ${{ secrets.SCW_PROJECT_ID }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_repo_url: ${{ github.server_url }}/${{ github.repository }}
        run: terraform apply -auto-approve

      - name: Get server IP
        working-directory: terraform/scaleway
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
        run: |
          IP=$(terraform output -raw server_ip)
          echo "## Server is starting up!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Connect to:** \`$IP:8777\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Give it ~5 minutes to fully boot before connecting." >> $GITHUB_STEP_SUMMARY
          echo "**Auto-shutdown in:** ${{ inputs.session_hours }} hours (if idle)" >> $GITHUB_STEP_SUMMARY
