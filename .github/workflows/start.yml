name: Start Server

on:
  workflow_dispatch:
    inputs:
      session_hours:
        description: "How many hours before auto-shutdown (default: 6)"
        required: false
        default: "6"

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_repo_url: ${{ github.server_url }}/${{ github.repository }}
        run: terraform apply -auto-approve

      - name: Get server IP
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
        run: |
          IP=$(terraform output -raw server_ip)
          echo "## Server is starting up!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Connect to:** \`$IP:8777\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Give it ~3 minutes to fully boot before connecting." >> $GITHUB_STEP_SUMMARY
          echo "**Auto-shutdown in:** ${{ inputs.session_hours }} hours (if empty)" >> $GITHUB_STEP_SUMMARY

      - name: Store session deadline
        run: |
          DEADLINE=$(date -d "+${{ inputs.session_hours }} hours" --utc +%s)
          echo $DEADLINE > /tmp/deadline
          # Write deadline to DO Spaces so auto-stop can read it
          curl -s -X PUT \
            -H "Authorization: AWS ${{ secrets.DO_SPACES_KEY }}:${{ secrets.DO_SPACES_SECRET }}" \
            -H "Content-Type: text/plain" \
            --data "$DEADLINE" \
            "https://nyc3.digitaloceanspaces.com/astro-server-tf-state/session-deadline"
        continue-on-error: true
