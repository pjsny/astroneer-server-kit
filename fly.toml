# astroneer-server-kit — generated by make setup; edit app/region/vm then fly deploy
app = "pjs-kingdom-6533a0"
primary_region = "iad"

[build]

[[restart]]
  policy = "on-failure"
  retries = 3
  processes = ["app"]

[env]
  DATA_DIR = "/data"
  ASTRONEER_SERVER_NAME = "pjs kingdom"
  ASTRONEER_GAME_PORT = "8777"
  ASTRONEER_CONSOLE_PORT = "8779"
  ASTRONEER_SERVER_ARGS = "-FullStdOutLogOutput"

[[mounts]]
  source = "astroneer_server_kit_data"
  destination = "/data"

[[vm]]
  memory = "8gb"
  cpu_kind = "shared"
  cpus = 4

[[services]]
  protocol = "tcp"
  internal_port = 8777
  processes = ["app"]

  [[services.ports]]
    port = 8777

[[services]]
  protocol = "udp"
  internal_port = 8777
  processes = ["app"]

  [[services.ports]]
    port = 8777

# Remote console (TCP) — not the game port; see ASTRONEER_CONSOLE_PORT / AstroServerSettings.ini ConsolePort
[[services]]
  protocol = "tcp"
  internal_port = 8779
  processes = ["app"]

  [[services.ports]]
    port = 8779
