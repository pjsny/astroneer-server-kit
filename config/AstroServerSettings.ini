[/Script/Astro.AstroServerSettings]
; Set this to your server's public IP (Vultr/Wine installs set this on first boot via cloud-init)
PublicIP=YOUR_DROPLET_IP

; Your Steam display name — you'll be set as owner on first connect
OwnerName=YOUR_STEAM_NAME
OwnerGuid=0

; Server name shown in the server browser
ServerName=My Astroneer Server

; Optional password (leave blank for no password)
ServerPassword=

; Max players (default 8 — same key as AstroTuxLauncher / Unreal: MaximumPlayerCount)
MaximumPlayerCount=8
