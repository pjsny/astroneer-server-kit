[/Script/Astro.AstroServerSettings]
; astroneer-server-kit template — live server uses /data/AstroServerSettings.ini on the Fly volume.
; Set this to your server's public IP (entrypoint refreshes PublicIP when possible; fly secrets set ASTRONEER_PUBLIC_IP=… if joins fail)
PublicIP=YOUR_PUBLIC_IP

; TCP remote console (not the game port — default 8779; game is 8777 UDP/TCP in Engine.ini)
ConsolePort=8779
ConsolePassword=lol123

; Your Steam display name — you'll be set as owner on first connect
OwnerName=YOUR_STEAM_NAME
OwnerGuid=0

; Server name shown in the server browser
ServerName=My Astroneer Server

; Optional password (leave blank for no password)
ServerPassword=

; Max players (default 8 — Unreal setting: MaximumPlayerCount)
MaximumPlayerCount=8
